server:
  port: 8081  # Changed from 8080 to 8081 to avoid the "Port already in use" error!

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/leaderboard?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root # Change this to your local MySQL username if it is different
    password: password # Change this to your local MySQL password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# JWT Configurations
jwt:
  secret: "9a756543b5a767d4f8e5d321c1092a4e23d1891bca7f798a0dcd109ab7d6f5c8"
  expiration: 86400000

# Swagger / OpenAPI Configurations
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
