server:
  port: 8081

kafka:
  enabled: false

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/leaderboard?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Spring Batch Configuration
  batch:
    jdbc:
      initialize-schema: always # Auto-creates batch meta-data tables!
    job:
      enabled: false # Do not run all batch jobs automatically on startup!

  # Kafka Configurations
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: smartwatch-leaderboard-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    listener:
      auto-startup: ${kafka.enabled}

# JWT Configurations
jwt:
  secret: "9a756543b5a767d4f8e5d321c1092a4e23d1891bca7f798a0dcd109ab7d6f5c8"
  expiration: 86400000

# Swagger / OpenAPI Configurations
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
